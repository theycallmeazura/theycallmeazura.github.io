<script>
  // LOADER
  window.onload=()=>{
    setTimeout(()=>{
      loader.style.opacity="0";
      setTimeout(()=>loader.style.display="none",600);
    },1000);
  };

  // ===== SMART TYPING (SLOW + HOLD) =====
  document.querySelectorAll(".typing").forEach(el=>{
    let texts=JSON.parse(el.getAttribute("data-text"));
    let i=0,j=0,cur="",del=false;

    function type(){
      if(!del && j<texts[i].length){
        cur+=texts[i][j++];
        el.innerHTML=cur;
        setTimeout(type,70); // slower typing
      }
      else if(!del && j===texts[i].length){
        del=true;
        setTimeout(type,5000); // HOLD 5 sec
      }
      else if(del && j>0){
        cur=cur.slice(0,--j);
        el.innerHTML=cur;
        setTimeout(type,30); // delete speed
      }
      else{
        del=false;
        i=(i+1)%texts.length;
        setTimeout(type,500);
      }
    }
    type();
  });

  // PARTICLES
  const c=document.getElementById("particles");
  const ctx=c.getContext("2d");
  c.width=innerWidth;c.height=innerHeight;
  let p=[];
  for(let i=0;i<60;i++) p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2,dx:Math.random()-0.5,dy:Math.random()-0.5});
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    p.forEach(a=>{
      ctx.beginPath();
      ctx.arc(a.x,a.y,a.r,0,6.28);
      ctx.fillStyle="white";
      ctx.fill();
      a.x+=a.dx;a.y+=a.dy;
    });
    requestAnimationFrame(draw);
  }
  draw();

  // SCROLL
  const sec=document.querySelectorAll("section");
  function show(){
    let y=scrollY;
    sec.forEach(s=>{
      if(y>s.offsetTop-window.innerHeight/1.2) s.classList.add("active");
    });
  }
  addEventListener("scroll",show);
  addEventListener("load",show);

  // SPOTLIGHT
  document.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("mousemove",e=>{
      const rect=card.getBoundingClientRect();
      card.style.setProperty("--x", e.clientX-rect.left+"px");
      card.style.setProperty("--y", e.clientY-rect.top+"px");
    });
  });

  // ===== REAL VISIBLE COUNTER =====
  let count = localStorage.getItem("azura_visits");

  if(!count){
    count = 1;
  } else {
    count = parseInt(count) + 1;
  }

  localStorage.setItem("azura_visits", count);

  document.getElementById("count").innerText = count;
</script>
