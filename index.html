<!DOCTYPE html>
<html>
<head>
  <title>Azura</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* PARTICLES BACKGROUND */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.08);
      max-width: 420px;
      margin: 100px auto;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* PROFILE IMAGE */
    .profile {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      margin-bottom: 15px;
      box-shadow: 0 0 20px #fff;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      font-size: 30px;
    }

    .typing {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
      border-right: 2px solid #fff;
      display: inline-block;
      padding-right: 5px;
      white-space: nowrap;
      overflow: hidden;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      50% {border-color: transparent;}
    }

    .buttons {
      margin-top: 25px;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 80%;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      font-size: 14px;
      transition: 0.3s;
    }

    .email {
      background: #1a1a1a;
    }

    .discord {
      background: #5865F2;
    }

    .instagram {
      background: linear-gradient(45deg, #ff004c, #ff7a00, #ff00cc);
    }

    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

  </style>

</head>
<body>

<canvas id="particles"></canvas>

<div class="card">
  <!-- ADD YOUR IMAGE LINK BELOW -->
  <img class="profile" src="https://i.imgur.com/yourimage.png">

  <h1>Azura 🚀</h1>
  <div class="typing" id="typing"></div>

  <div class="buttons">
    <a class="btn email" href="mailto:azura7636@gmail.com">📧 Email Me</a>
    <a class="btn discord">💬 Discord: theycallmeazura</a>
    <a class="btn instagram" href="https://instagram.com/theycallmeazura" target="_blank">📸 Instagram</a>
  </div>
</div>

<script>
  // TYPING EFFECT
  const text = "Discord Community Manager";
  let i = 0;
  function typing() {
    if (i < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 60);
    }
  }
  typing();

  // PARTICLES
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];

  for (let i = 0; i < 80; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2,
      dx: Math.random() - 0.5,
      dy: Math.random() - 0.5
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = "white";
      ctx.fill();

      p.x += p.dx;
      p.y += p.dy;

      if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
      if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(animate);
  }

  animate();
</script>

</body>
</html>
