<!DOCTYPE html>
<html>
<head>
  <title>Azura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:'Segoe UI',sans-serif;
      background:#000;
      color:white;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    canvas{
      position:fixed;
      top:0;
      left:0;
      z-index:-1;
    }

    .nav{
      position:fixed;
      top:20px;
      right:20px;
      z-index:100;
    }

    .nav a{
      color:#aaa;
      margin-left:12px;
      text-decoration:none;
      font-size:14px;
    }

    .nav a:hover{color:#fff;}

    section{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
      opacity:0;
      transform:translateY(60px);
      transition:1s ease;
    }

    section.active{
      opacity:1;
      transform:translateY(0);
    }

    .card{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(20px);
      border-radius:20px;
      padding:30px;
      max-width:420px;
      width:100%;
      text-align:center;
      border:1px solid rgba(255,255,255,0.1);
    }

    h1{
      font-size:28px;
      background:linear-gradient(90deg,#00c6ff,#ff0055);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .typing{
      margin-top:10px;
      color:#888;
      font-size:13px;
      height:20px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin:12px auto;
      padding:12px;
      border-radius:10px;
      text-decoration:none;
      width:90%;
      color:white;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
    }

    .btn:hover{
      background:rgba(255,255,255,0.1);
      transform:scale(1.05);
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      border:none;
      background:#111;
      color:white;
    }

    /* FAQ */
    .faq-item{
      text-align:left;
      margin-top:10px;
      cursor:pointer;
    }

    .faq-question{
      background:#111;
      padding:10px;
      border-radius:8px;
    }

    .faq-answer{
      max-height:0;
      overflow:hidden;
      transition:0.4s;
      color:#aaa;
      padding:0 10px;
    }

    .faq-item.active .faq-answer{
      max-height:100px;
      padding:10px;
    }

  </style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="nav">
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#socials">Socials</a>
  <a href="#contact">Contact</a>
  <a href="#faq">FAQ</a>
</div>

<section id="home">
  <div class="card">
    <h1>theycallmeazura 🚀</h1>
    <div class="typing" data-text='["Managing communities","Growing servers","Building brands"]'></div>
  </div>
</section>

<section id="about">
  <div class="card">
    <h1>About</h1>
    <div class="typing" data-text='["Professional Discord manager","Growth focused","Community builder"]'></div>
  </div>
</section>

<section id="socials">
  <div class="card">
    <h1>Socials</h1>
    <div class="typing" data-text='["Connect with me","Stay updated","Let's grow together"]'></div>

    <a class="btn" href="https://discord.com/users/1476420907718152204" target="_blank">💬 Discord</a>
    <a class="btn" href="https://instagram.com/theycallmeazura" target="_blank">📸 Instagram</a>

  </div>
</section>

<section id="contact">
  <div class="card">
    <h1>Contact</h1>

    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="message" placeholder="Your Message"></textarea>

    <div class="btn" onclick="sendMail()">Send Message</div>
  </div>
</section>

<section id="faq">
  <div class="card">
    <h1>FAQ</h1>

    <div class="faq-item">
      <div class="faq-question">How fast do you reply?</div>
      <div class="faq-answer">Within 24 hours.</div>
    </div>

    <div class="faq-item">
      <div class="faq-question">Do you manage Discord servers?</div>
      <div class="faq-answer">Yes, based on your needs.</div>
    </div>

    <div class="faq-item">
      <div class="faq-question">How can I contact you?</div>
      <div class="faq-answer">Use contact form or socials.</div>
    </div>

  </div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function(){

// TYPING (1.5 sec hold)
document.querySelectorAll(".typing").forEach(el=>{
  try{
    let texts=JSON.parse(el.getAttribute("data-text"));
    let i=0,j=0,cur="",del=false;

    function type(){
      if(!del && j<texts[i].length){
        cur+=texts[i][j++];
        el.innerHTML=cur;
        setTimeout(type,70);
      }
      else if(!del){
        del=true;
        setTimeout(type,1500);
      }
      else if(del && j>0){
        cur=cur.slice(0,--j);
        el.innerHTML=cur;
        setTimeout(type,30);
      }
      else{
        del=false;
        i=(i+1)%texts.length;
        setTimeout(type,500);
      }
    }
    type();
  }catch(e){}
});

// PARTICLES SAFE
try{
  const c=document.getElementById("particles");
  if(c){
    const ctx=c.getContext("2d");
    c.width=window.innerWidth;
    c.height=window.innerHeight;

    let p=[];
    for(let i=0;i<40;i++){
      p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
    }

    function draw(){
      ctx.clearRect(0,0,c.width,c.height);
      p.forEach(a=>{
        ctx.beginPath();
        ctx.arc(a.x,a.y,a.r,0,6.28);
        ctx.fillStyle="white";
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  }
}catch(e){}

// SCROLL
const sec=document.querySelectorAll("section");
function show(){
  let y=window.scrollY;
  sec.forEach(s=>{
    if(y>s.offsetTop-window.innerHeight/1.2){
      s.classList.add("active");
    }
  });
}
window.addEventListener("scroll",show);
show();

// CONTACT
window.sendMail=function(){
  let name=document.getElementById("name")?.value || "";
  let email=document.getElementById("email")?.value || "";
  let msg=document.getElementById("message")?.value || "";

  window.location.href=`mailto:azura7636@gmail.com?subject=${name}&body=${msg} (${email})`;
}

// FAQ
document.querySelectorAll(".faq-item").forEach(item=>{
  item.addEventListener("click",()=>{
    item.classList.toggle("active");
  });
});

});
</script>

</body>
</html>
