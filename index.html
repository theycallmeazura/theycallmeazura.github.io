<!DOCTYPE html>
<html>
<head>
  <title>Azura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:'Segoe UI',system-ui,sans-serif;
      background:#0a0a0a;
      color:white;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    canvas{
      position:fixed;
      top:0;
      left:0;
      z-index:-1;
    }

    /* === NEW: CURSOR GLOW === */
    .cursor{
      position:fixed;
      width:120px;
      height:120px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,198,255,0.15), transparent 70%);
      pointer-events:none;
      transform:translate(-50%,-50%);
      z-index:999;
    }

    /* KEEP ALL YOUR OLD STYLES SAME BELOW */

    .overlay{
      position:fixed;
      inset:0;
      backdrop-filter:blur(6px);
      background:rgba(0,0,0,0.4);
      opacity:0;
      pointer-events:none;
      transition:0.3s;
      z-index:140;
    }

    .overlay.active{
      opacity:1;
      pointer-events:auto;
    }

    .menu-btn{
      position:fixed;
      top:20px;
      left:20px;
      width:28px;
      height:22px;
      cursor:pointer;
      z-index:200;
    }

    .menu-btn span{
      display:block;
      height:3px;
      width:100%;
      background:white;
      margin:5px 0;
      transition:0.3s;
      border-radius:2px;
    }

    .menu-btn.active span:nth-child(1){
      transform:rotate(45deg) translate(5px,5px);
    }
    .menu-btn.active span:nth-child(2){
      opacity:0;
    }
    .menu-btn.active span:nth-child(3){
      transform:rotate(-45deg) translate(6px,-6px);
    }

    .mobile-menu{
      position:fixed;
      top:0;
      left:-100%;
      width:240px;
      height:100%;
      background:#0a0a0a;
      padding:70px 20px;
      transition:0.35s ease;
      z-index:150;
      border-right:1px solid rgba(255,255,255,0.1);
    }

    .mobile-menu.active{
      left:0;
    }

    .mobile-menu a{
      display:block;
      margin:18px 0;
      color:#ccc;
      text-decoration:none;
      font-size:15px;
    }

    .nav{
      position:fixed;
      top:20px;
      right:30px;
      z-index:100;
    }

    .nav a{
      color:#9aa0a6;
      margin-left:15px;
      text-decoration:none;
      font-size:14px;
    }

    section{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
      opacity:0;
      transform:translateY(40px);
      transition:0.8s;
    }

    section.active{
      opacity:1;
      transform:translateY(0);
    }

    .card{
      background:rgba(255,255,255,0.04);
      backdrop-filter:blur(16px);
      border-radius:18px;
      padding:40px;
      max-width:520px;
      width:100%;
      text-align:center;
      border:1px solid rgba(255,255,255,0.08);

      box-shadow:
        0 0 15px rgba(0,198,255,0.25),
        0 0 30px rgba(0,198,255,0.15);
    }

    h1{
      font-size:30px;
      background:linear-gradient(90deg,#00c6ff,#ff0055);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .btn{
      display:flex;
      justify-content:center;
      margin:14px auto;
      padding:12px;
      border-radius:10px;
      width:85%;
      text-decoration:none;
      color:white;
      transition:0.25s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

  </style>
</head>

<body>

<!-- NEW CURSOR -->
<div class="cursor" id="cursor"></div>

<canvas id="particles"></canvas>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="menu-btn" id="menuBtn" onclick="toggleMenu()">
  <span></span><span></span><span></span>
</div>

<div class="mobile-menu" id="menu">
  <a href="#home" onclick="toggleMenu()">Home</a>
  <a href="#about" onclick="toggleMenu()">About</a>
  <a href="#philosophy" onclick="toggleMenu()">Philosophy</a>
  <a href="#socials" onclick="toggleMenu()">Socials</a>
  <a href="#contact" onclick="toggleMenu()">Contact</a>
  <a href="#faq" onclick="toggleMenu()">FAQ</a>
</div>

<div class="nav">
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#philosophy">Philosophy</a>
  <a href="#socials">Socials</a>
  <a href="#contact">Contact</a>
  <a href="#faq">FAQ</a>
</div>

<section id="home">
  <div class="card">
    <h1>theycallmeazura 🚀</h1>
  </div>
</section>

<section id="about">
  <div class="card">
    <h1>About</h1>
  </div>
</section>

<section id="philosophy">
  <div class="card">
    <h1>👤 Core Philosophy</h1>
  </div>
</section>

<section id="socials">
  <div class="card">
    <h1>Socials</h1>
    <a class="btn discord">Discord</a>
    <a class="btn instagram">Instagram</a>
  </div>
</section>

<section id="contact">
  <div class="card">
    <h1>Contact</h1>
  </div>
</section>

<section id="faq">
  <div class="card">
    <h1>FAQ</h1>
  </div>
</section>

<script>
function toggleMenu(){
  menu.classList.toggle("active");
  menuBtn.classList.toggle("active");
  overlay.classList.toggle("active");
}

/* CURSOR FOLLOW */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",(e)=>{
  cursor.style.top=e.clientY+"px";
  cursor.style.left=e.clientX+"px";
});

/* SCROLL */
window.addEventListener("scroll",()=>{
  document.querySelectorAll("section").forEach(s=>{
    if(scrollY>s.offsetTop-400){
      s.classList.add("active");
    }
  });
});
</script>

</body>
</html>
