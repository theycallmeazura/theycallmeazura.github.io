<!DOCTYPE html>
<html>
<head>
  <title>Azura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:'Segoe UI',sans-serif;
      background:#000;
      color:#fff;
      overflow:hidden;
    }

    /* BACKGROUND GLOW */
    body::before, body::after{
      content:"";
      position:fixed;
      width:600px;
      height:600px;
      filter:blur(120px);
      z-index:-1;
      animation:move 12s infinite alternate;
    }

    body::before{
      background:radial-gradient(circle,#00c6ff,transparent);
      top:-100px;left:-100px;
    }

    body::after{
      background:radial-gradient(circle,#ff0055,transparent);
      bottom:-100px;right:-100px;
    }

    @keyframes move{
      from{transform:translate(0,0);}
      to{transform:translate(120px,60px);}
    }

    /* CARD */
    .card{
      position:absolute;
      top:50%;left:50%;
      transform:translate(-50%,-50%);
      backdrop-filter:blur(20px);
      background:rgba(255,255,255,0.05);
      padding:40px;
      border-radius:20px;
      width:90%;
      max-width:500px;
      text-align:center;
      border:1px solid rgba(255,255,255,0.1);
      box-shadow:0 0 50px rgba(0,150,255,0.1);
    }

    /* NAME */
    h1{
      font-size:36px;
      background:linear-gradient(90deg,#00c6ff,#ff0055,#00c6ff);
      background-size:200%;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:gradientMove 5s linear infinite;
    }

    @keyframes gradientMove{
      0%{background-position:0%;}
      100%{background-position:200%;}
    }

    .tagline{color:#aaa;margin-top:5px;}

    #typing{
      margin-top:10px;
      color:#888;
      font-size:13px;
      height:18px;
    }

    .desc{
      margin-top:15px;
      color:#bbb;
      font-size:14px;
    }

    /* DISCORD CARD */
    .discord-card{
      margin-top:20px;
      padding:15px;
      border-radius:12px;
      background:#2b2d31;
      text-align:left;
    }

    .discord-header{
      display:flex;
      align-items:center;
    }

    .discord-avatar{
      width:50px;height:50px;
      border-radius:50%;
      margin-right:10px;
    }

    .status{color:#23a55a;font-size:12px;}

    .bio{
      margin-top:10px;
      font-size:13px;
      color:#ccc;
    }

    /* BUTTONS */
    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      margin:12px auto;
      padding:12px;
      border-radius:12px;
      text-decoration:none;
      width:80%;
      color:white;
      font-size:14px;
      position:relative;
      overflow:hidden;
      transition:0.3s;
    }

    .btn svg{width:18px;height:18px;}

    .email{
      background:rgba(255,255,255,0.05);
      box-shadow:0 0 15px rgba(255,255,255,0.2);
    }

    .discord{
      background:rgba(88,101,242,0.2);
      box-shadow:0 0 20px rgba(88,101,242,0.6);
    }

    .instagram{
      background:rgba(255,0,100,0.2);
      box-shadow:0 0 20px rgba(255,0,100,0.6);
    }

    .btn:hover{
      transform:scale(1.06);
    }

    /* RIPPLE */
    .ripple{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.4);
      transform:scale(0);
      animation:ripple 0.6s linear;
    }

    @keyframes ripple{
      to{transform:scale(4);opacity:0;}
    }

  </style>
</head>

<body>

<div class="card">

  <h1>theycallmeazura 🚀</h1>
  <div class="tagline">Discord Community Manager</div>

  <div id="typing"></div>

  <div class="desc">
    Helping creators build and manage strong communities.
  </div>

  <div class="discord-card">
    <div class="discord-header">
      <img class="discord-avatar" src="https://cdn.discordapp.com/avatars/1476420907718152204/e8133febacee9df2d85280cd729a4094.webp?size=2048">
      <div>
        <strong>theycallmeazura</strong><br>
        <span class="status">● Online</span>
      </div>
    </div>

    <div class="bio">
      Only mail when required.<br>
      Don't expect DM replies.
    </div>
  </div>

  <!-- BUTTONS -->
  <a class="btn email" href="mailto:azura7636@gmail.com">
    <svg fill="white" viewBox="0 0 24 24"><path d="M2 4h20v16H2z"/><path d="M2 4l10 9 10-9"/></svg>
    Email
  </a>

  <a class="btn discord" href="https://discord.gg/YOUR-LINK">
    <svg fill="white" viewBox="0 0 24 24"><path d="M20 0H4C1.8 0 0 1.8 0 4v16c0 2.2 1.8 4 4 4h16l-1.2-4.2 2.9 2.7 2.7 2.5V4c0-2.2-1.8-4-4-4z"/></svg>
    Discord
  </a>

  <a class="btn instagram" href="https://instagram.com/theycallmeazura" target="_blank">
    <svg fill="white" viewBox="0 0 24 24"><path d="M7 2h10a5 5 0 015 5v10a5 5 0 01-5 5H7a5 5 0 01-5-5V7a5 5 0 015-5zm5 5a5 5 0 100 10 5 5 0 000-10zm6.5-.9a1.4 1.4 0 11-2.8 0 1.4 1.4 0 012.8 0z"/></svg>
    Instagram
  </a>

</div>

<script>
  // TYPING LOOP
  const texts=[
    "Managing communities.",
    "Growing servers.",
    "Building brands."
  ];
  let i=0,j=0,current="";
  function type(){
    if(j<texts[i].length){
      current+=texts[i][j];
      document.getElementById("typing").innerHTML=current;
      j++;
      setTimeout(type,40);
    }else{
      setTimeout(()=>{
        current="";
        j=0;
        i=(i+1)%texts.length;
        type();
      },1200);
    }
  }
  type();

  // RIPPLE
  document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("click",function(e){
      const circle=document.createElement("span");
      circle.classList.add("ripple");
      const rect=this.getBoundingClientRect();
      circle.style.left=e.clientX-rect.left+"px";
      circle.style.top=e.clientY-rect.top+"px";
      this.appendChild(circle);
      setTimeout(()=>circle.remove(),600);
    });
  });
</script>

</body>
</html>
