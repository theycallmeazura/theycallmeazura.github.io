<!DOCTYPE html>
<html>
<head>
  <title>Azura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #111, #000);
      color: white;
      overflow-x: hidden;
    }

    /* SMOOTH SCROLL */
    html { scroll-behavior: smooth; }

    /* NAV */
    .nav {
      position: fixed;
      top: 20px;
      right: 30px;
      z-index: 10;
    }

    .nav a {
      color: #aaa;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .nav a:hover {
      color: white;
    }

    /* SECTION */
    section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      opacity: 0;
      transform: translateY(40px);
      transition: 0.8s ease;
    }

    section.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* CARD */
    .card {
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .tagline {
      color: #888;
      font-size: 14px;
    }

    .desc {
      margin-top: 15px;
      color: #bbb;
      font-size: 14px;
    }

    /* DISCORD CARD */
    .discord-card {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      background: #2b2d31;
      text-align: left;
    }

    .discord-header {
      display: flex;
      align-items: center;
    }

    .discord-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .status {
      color: #23a55a;
      font-size: 12px;
    }

    .bio {
      margin-top: 10px;
      font-size: 13px;
      color: #ccc;
    }

    /* BUTTONS */
    .btn {
      display: block;
      margin: 12px auto;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      width: 80%;
      color: white;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.3s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.1);
      transform: scale(1.03);
    }

    /* PARTICLES */
    canvas {
      position: fixed;
      top:0;
      left:0;
      z-index:-1;
    }

  </style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="nav">
  <a href="#home">Home</a>
  <a href="#about">About</a>
</div>

<!-- HOME -->
<section id="home">
  <div class="card">
    <h1>Azura 🚀</h1>
    <div class="tagline">Discord Community Manager</div>

    <div class="desc">
      Helping creators build and manage strong communities.
    </div>

    <div class="discord-card">
      <div class="discord-header">
        <img class="discord-avatar" src="https://cdn.discordapp.com/avatars/1476420907718152204/e8133febacee9df2d85280cd729a4094.webp?size=2048">
        <div>
          <strong>theycallmeazura</strong><br>
          <span class="status">● Online</span>
        </div>
      </div>

      <div class="bio">
        Only mail when required.<br>
        Don't expect DM replies.
      </div>
    </div>

    <a class="btn" href="mailto:azura7636@gmail.com">Email</a>
    <a class="btn" href="https://instagram.com/theycallmeazura" target="_blank">Instagram</a>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="card">
    <h1>About Me</h1>
    <div class="desc">
      I manage Discord communities for creators with a focus on structure, moderation, and growth.
    </div>
  </div>
</section>

<script>
  // PARTICLES
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");

  canvas.width = innerWidth;
  canvas.height = innerHeight;

  let particles = [];
  for(let i=0;i<60;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*2,
      dx:Math.random()-0.5,
      dy:Math.random()-0.5
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle="white";
      ctx.fill();

      p.x+=p.dx;
      p.y+=p.dy;
    });
    requestAnimationFrame(draw);
  }
  draw();

  // SCROLL ANIMATION
  const sections=document.querySelectorAll("section");
  function show(){
    let y=scrollY;
    sections.forEach(s=>{
      if(y > s.offsetTop - window.innerHeight/1.3){
        s.classList.add("active");
      }
    });
  }
  addEventListener("scroll",show);
  addEventListener("load",show);
</script>

</body>
</html>
