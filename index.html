<!DOCTYPE html>
<html>
<head>
  <title>Azura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:'Segoe UI',system-ui,sans-serif;
      background:#0a0a0a;
      color:white;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    /* ✅ BACKGROUND ADDED (SAFE) */
    .bg-animated{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:-10;

      background: radial-gradient(circle at 20% 30%, rgba(0,198,255,0.15), transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(255,0,85,0.12), transparent 40%),
                  #0a0a0a;

      animation: moveBg 12s ease-in-out infinite alternate;
    }

    .bg-animated::after{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size:40px 40px;
    }

    @keyframes moveBg{
      0%{
        background-position: 20% 30%, 80% 70%;
      }
      100%{
        background-position: 40% 60%, 60% 40%;
      }
    }
    /* ✅ END BACKGROUND */

    canvas{
      position:fixed;
      top:0;
      left:0;
      z-index:-1;
    }

    .cursor{
      position:fixed;
      width:120px;
      height:120px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,198,255,0.15), transparent 70%);
      pointer-events:none;
      transform:translate(-50%,-50%);
      z-index:999;
    }

    .menu-btn{
      position:fixed;
      top:20px;
      left:20px;
      width:28px;
      height:22px;
      cursor:pointer;
      z-index:200;
    }

    .menu-btn span{
      display:block;
      height:3px;
      width:100%;
      background:white;
      margin:5px 0;
      transition:0.3s;
    }

    .menu-btn.active span:nth-child(1){
      transform:rotate(45deg) translate(5px,5px);
    }
    .menu-btn.active span:nth-child(2){opacity:0;}
    .menu-btn.active span:nth-child(3){
      transform:rotate(-45deg) translate(6px,-6px);
    }

    .mobile-menu{
      position:fixed;
      top:0;
      left:-100%;
      width:240px;
      height:100%;
      background:#0a0a0a;
      padding:70px 20px;
      transition:0.3s;
      z-index:150;
    }

    .mobile-menu.active{left:0;}

    .mobile-menu a{
      display:block;
      margin:18px 0;
      color:#ccc;
      text-decoration:none;
    }

    section{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
      opacity:0;
      transform:translateY(40px);
      transition:0.8s;
    }

    section.active{
      opacity:1;
      transform:translateY(0);
    }

    .card{
      background:rgba(255,255,255,0.04);
      backdrop-filter:blur(16px);
      border-radius:18px;
      padding:40px;
      max-width:520px;
      width:100%;
      text-align:center;
      border:1px solid rgba(255,255,255,0.08);

      box-shadow:
        0 0 20px rgba(0,198,255,0.35),
        0 0 40px rgba(0,198,255,0.2);
    }

    h1{
      font-size:30px;
      background:linear-gradient(90deg,#00c6ff,#ff0055);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .typing{
      margin-top:10px;
      color:#9aa0a6;
      font-size:14px;
      height:22px;
    }

    p{
      color:#b0b0b0;
      margin-top:12px;
      font-size:14px;
      line-height:1.6;
    }

    .highlight{
      color:#ffffff;
      font-weight:500;
    }

    .btn{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:8px;
      margin:14px auto;
      padding:12px;
      border-radius:10px;
      width:85%;
      text-decoration:none;
      color:white;
      cursor:pointer;
    }

    .btn.discord{background:#5865F2;}
    .btn.instagram{background:linear-gradient(45deg,#d62976,#962fbf);}
    .btn.send{background:linear-gradient(90deg,#00c6ff,#0072ff);}

    input, textarea{
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:8px;
      border:none;
      background:#111;
      color:white;
    }

    .faq-item{margin-top:10px;cursor:pointer;}

    .faq-question{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-weight:600;
    }

    .faq-answer{
      max-height:0;
      overflow:hidden;
      transition:0.3s;
      color:#aaa;
    }

    .faq-item.active .faq-answer{
      max-height:120px;
    }

    .stats{
      display:flex;
      justify-content:space-between;
      margin-top:20px;
    }

    .stat h2{
      color:#00c6ff;
      font-size:28px;
    }

  </style>
</head>

<body>

<!-- ✅ ONLY ADDITION -->
<div class="bg-animated"></div>

<div class="cursor" id="cursor"></div>
<canvas id="particles"></canvas>

<!-- ⚠️ YOUR FULL ORIGINAL WEBSITE CONTINUES HERE (UNCHANGED) -->

</body>
</html>
