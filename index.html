<!DOCTYPE html>
<html>
<head>
  <title>Azura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:'Segoe UI',sans-serif;
      background:#000;
      color:white;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    canvas{
      position:fixed;
      top:0;
      left:0;
      z-index:-1;
    }

    .nav{
      position:fixed;
      top:20px;
      right:30px;
      z-index:100;
    }

    .nav a{
      color:#aaa;
      margin-left:15px;
      text-decoration:none;
    }

    .nav a:hover{color:#fff;}

    section{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
      opacity:0;
      transform:translateY(60px);
      transition:1s ease;
    }

    section.active{
      opacity:1;
      transform:translateY(0);
    }

    .card{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(20px);
      border-radius:20px;
      padding:40px;
      max-width:500px;
      width:100%;
      text-align:center;
      border:1px solid rgba(255,255,255,0.1);
    }

    h1{
      font-size:32px;
      background:linear-gradient(90deg,#00c6ff,#ff0055);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .typing{
      margin-top:10px;
      color:#888;
      font-size:13px;
      height:20px;
    }

    .desc{margin-top:15px;color:#bbb;}

    .btn{
      display:block;
      margin:12px auto;
      padding:12px;
      border-radius:10px;
      text-decoration:none;
      width:80%;
      color:white;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      border:none;
      outline:none;
      background:#111;
      color:white;
    }

    /* Discord Card */
    .discord-card{
      margin-top:20px;
      padding:15px;
      border-radius:12px;
      background:#2b2d31;
      text-align:left;
    }

    .discord-header{
      display:flex;
      align-items:center;
    }

    .discord-avatar{
      width:50px;height:50px;
      border-radius:50%;
      margin-right:10px;
    }

    /* FAQ */
    .faq-item{
      text-align:left;
      margin-top:10px;
      cursor:pointer;
    }

    .faq-question{
      background:#111;
      padding:10px;
      border-radius:8px;
    }

    .faq-answer{
      max-height:0;
      overflow:hidden;
      transition:0.4s;
      color:#aaa;
      padding:0 10px;
    }

    .faq-item.active .faq-answer{
      max-height:100px;
      padding:10px;
    }

  </style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="nav">
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#socials">Socials</a>
  <a href="#contact">Contact</a>
  <a href="#faq">FAQ</a>
</div>

<!-- HOME -->
<section id="home">
  <div class="card">
    <h1>theycallmeazura 🚀</h1>
    <div class="typing" data-text='["Managing communities","Growing servers","Building brands"]'></div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <div class="card">
    <h1>About</h1>
    <div class="typing" data-text='["Professional Discord manager","Growth focused","Community builder"]'></div>
    <div class="desc">Helping creators build strong communities.</div>
  </div>
</section>

<!-- SOCIALS (MERGED) -->
<section id="socials">
  <div class="card">
    <h1>Socials</h1>
    <div class="typing" data-text='["Connect with me","Discord & Instagram","Stay updated"]'></div>

    <div class="discord-card">
      <div class="discord-header">
        <img class="discord-avatar" src="https://cdn.discordapp.com/avatars/1476420907718152204/e8133febacee9df2d85280cd729a4094.webp?size=2048">
        <div>
          <strong>theycallmeazura</strong><br>
          <span style="color:#23a55a;">● Online</span>
        </div>
      </div>
    </div>

    <a class="btn" href="https://instagram.com/theycallmeazura" target="_blank">
      Instagram @theycallmeazura
    </a>

  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="card">
    <h1>Contact</h1>

    <input type="text" id="name" placeholder="Your Name">
    <input type="email" id="email" placeholder="Your Email">
    <textarea id="message" placeholder="Your Message"></textarea>

    <div class="btn" onclick="sendMail()">Send Message</div>
  </div>
</section>

<!-- FAQ -->
<section id="faq">
  <div class="card">
    <h1>FAQ</h1>

    <div class="faq-item">
      <div class="faq-question">How fast do you reply?</div>
      <div class="faq-answer">Within 24 hours usually.</div>
    </div>

    <div class="faq-item">
      <div class="faq-question">Do you manage servers?</div>
      <div class="faq-answer">Yes, based on requirements.</div>
    </div>

  </div>
</section>

<script>
  // SMART TYPING (2.5 sec hold)
  document.querySelectorAll(".typing").forEach(el=>{
    let texts=JSON.parse(el.getAttribute("data-text"));
    let i=0,j=0,cur="",del=false;

    function type(){
      if(!del && j<texts[i].length){
        cur+=texts[i][j++];
        el.innerHTML=cur;
        setTimeout(type,70);
      }
      else if(!del){
        del=true;
        setTimeout(type,2500); // FIXED
      }
      else if(del && j>0){
        cur=cur.slice(0,--j);
        el.innerHTML=cur;
        setTimeout(type,30);
      }
      else{
        del=false;
        i=(i+1)%texts.length;
        setTimeout(type,500);
      }
    }
    type();
  });

  // PARTICLES
  const c=document.getElementById("particles");
  const ctx=c.getContext("2d");
  c.width=innerWidth;c.height=innerHeight;

  let p=[];
  for(let i=0;i<50;i++){
    p.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*2});
  }

  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    p.forEach(a=>{
      ctx.beginPath();
      ctx.arc(a.x,a.y,a.r,0,6.28);
      ctx.fillStyle="white";
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();

  // SCROLL
  const sec=document.querySelectorAll("section");
  function show(){
    let y=scrollY;
    sec.forEach(s=>{
      if(y>s.offsetTop-window.innerHeight/1.2){
        s.classList.add("active");
      }
    });
  }
  addEventListener("scroll",show);
  addEventListener("load",show);

  // CONTACT
  function sendMail(){
    let name=document.getElementById("name").value;
    let email=document.getElementById("email").value;
    let msg=document.getElementById("message").value;

    window.location.href=`mailto:azura7636@gmail.com?subject=${name}&body=${msg} (${email})`;
  }

  // FAQ
  document.querySelectorAll(".faq-item").forEach(item=>{
    item.addEventListener("click",()=>{
      item.classList.toggle("active");
    });
  });

</script>

</body>
</html>
