<!DOCTYPE html>
<html>
<head>
  <title>Azura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:'Segoe UI',sans-serif;
      background:#000;
      color:white;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    canvas{
      position:fixed;
      top:0;
      left:0;
      z-index:-1;
    }

    /* LOADER */
    #loader{
      position:fixed;
      width:100%;
      height:100%;
      background:#000;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:99999;
      flex-direction:column;
      transition:opacity 0.6s ease;
    }

    .loader-circle{
      width:60px;
      height:60px;
      border:4px solid rgba(255,255,255,0.1);
      border-top:4px solid #00c6ff;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }

    #loader h2{
      margin-top:15px;
      font-size:20px;
      background:linear-gradient(90deg,#00c6ff,#ff0055);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    /* NAV */
    .nav{
      position:fixed;
      top:20px;
      right:30px;
      z-index:100;
    }

    .nav a{
      color:#aaa;
      margin-left:15px;
      text-decoration:none;
    }

    .nav a:hover{color:#fff;}

    section{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
      opacity:0;
      transform:translateY(60px);
      transition:1s ease;
    }

    section.active{
      opacity:1;
      transform:translateY(0);
    }

    .card{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(20px);
      border-radius:20px;
      padding:40px;
      max-width:500px;
      width:100%;
      text-align:center;
      border:1px solid rgba(255,255,255,0.1);
    }

    h1{
      font-size:36px;
      background:linear-gradient(90deg,#00c6ff,#ff0055,#00c6ff);
      background-size:200%;
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      animation:gradient 5s linear infinite;
    }

    @keyframes gradient{
      to{background-position:200%;}
    }

    .typing{
      margin-top:10px;
      color:#888;
      font-size:13px;
      height:18px;
    }

    .desc{margin-top:15px;color:#bbb;}

    .btn{
      display:block;
      margin:12px auto;
      padding:12px;
      border-radius:10px;
      text-decoration:none;
      width:80%;
      color:white;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.1);
    }

    .btn:hover{
      transform:scale(1.05);
      background:rgba(255,255,255,0.1);
    }

    .discord-card{
      margin-top:20px;
      padding:15px;
      border-radius:12px;
      background:#2b2d31;
      text-align:left;
    }

    .discord-header{
      display:flex;
      align-items:center;
    }

    .discord-avatar{
      width:50px;height:50px;
      border-radius:50%;
      margin-right:10px;
    }

    .status{color:#23a55a;font-size:12px;}

  </style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-circle"></div>
  <h2>theycallmeazura</h2>
</div>

<canvas id="particles"></canvas>

<div class="nav">
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#services">Services</a>
  <a href="#email">Email</a>
  <a href="#discord">Discord</a>
  <a href="#instagram">Instagram</a>
</div>

<section id="home">
  <div class="card">
    <h1>theycallmeazura 🚀</h1>
    <div class="typing" data-text="Managing communities. Growing servers. Building brands."></div>
  </div>
</section>

<section id="about">
  <div class="card">
    <h1>About</h1>
    <div class="typing" data-text="Professional Discord manager focused on growth."></div>
  </div>
</section>

<section id="services">
  <div class="card">
    <h1>Services</h1>
    <div class="typing" data-text="Setup. Moderation. Growth. Engagement."></div>
  </div>
</section>

<section id="email">
  <div class="card">
    <h1>Email</h1>
    <div class="typing" data-text="For serious business only."></div>
    <a class="btn" href="mailto:azura7636@gmail.com">Send Email</a>
  </div>
</section>

<section id="discord">
  <div class="card">
    <h1>Discord</h1>
    <div class="typing" data-text="Reach me on Discord."></div>

    <div class="discord-card">
      <div class="discord-header">
        <img class="discord-avatar" src="https://cdn.discordapp.com/avatars/1476420907718152204/e8133febacee9df2d85280cd729a4094.webp?size=2048">
        <div>
          <strong>theycallmeazura</strong><br>
          <span class="status">● Loading...</span>
        </div>
      </div>
    </div>

  </div>
</section>

<section id="instagram">
  <div class="card">
    <h1>Instagram</h1>
    <div class="typing" data-text="Follow for updates."></div>
    <a class="btn" href="https://instagram.com/theycallmeazura" target="_blank">@theycallmeazura</a>
  </div>
</section>

<script>
  // LOADER
  window.addEventListener("load",()=>{
    setTimeout(()=>{
      const loader=document.getElementById("loader");
      loader.style.opacity="0";
      setTimeout(()=>loader.style.display="none",600);
    },1000);
  });

  // TYPING
  document.querySelectorAll(".typing").forEach(el=>{
    let text=el.getAttribute("data-text");
    let i=0;
    function type(){
      if(i<text.length){
        el.innerHTML+=text[i];
        i++;
        setTimeout(type,30);
      }
    }
    type();
  });

  // PARTICLES
  const canvas=document.getElementById("particles");
  const ctx=canvas.getContext("2d");
  canvas.width=innerWidth;
  canvas.height=innerHeight;

  let particles=[];
  for(let i=0;i<70;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*2,
      dx:Math.random()-0.5,
      dy:Math.random()-0.5
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle="white";
      ctx.fill();
      p.x+=p.dx;
      p.y+=p.dy;
    });
    requestAnimationFrame(draw);
  }
  draw();

  // SCROLL
  const sections=document.querySelectorAll("section");
  function show(){
    let y=scrollY;
    sections.forEach(s=>{
      if(y > s.offsetTop - window.innerHeight/1.2){
        s.classList.add("active");
      }
    });
  }
  addEventListener("scroll",show);
  addEventListener("load",show);

  // CURSOR GLOW
  const glow=document.createElement("div");
  glow.style.position="fixed";
  glow.style.width="120px";
  glow.style.height="120px";
  glow.style.borderRadius="50%";
  glow.style.pointerEvents="none";
  glow.style.background="radial-gradient(circle, rgba(0,150,255,0.3), transparent)";
  glow.style.zIndex="9999";
  glow.style.transform="translate(-50%,-50%)";
  document.body.appendChild(glow);

  document.addEventListener("mousemove",e=>{
    glow.style.left=e.clientX+"px";
    glow.style.top=e.clientY+"px";
  });

  // DISCORD API
  const userId="1476420907718152204";
  async function fetchDiscord(){
    try{
      let res=await fetch(`https://api.lanyard.rest/v1/users/${userId}`);
      let data=await res.json();
      let statusEl=document.querySelector(".status");

      if(data.success){
        let s=data.data.discord_status;
        statusEl.innerHTML="● "+s.toUpperCase();
      }
    }catch{}
  }

  fetchDiscord();
  setInterval(fetchDiscord,10000);
</script>

</body>
</html>
