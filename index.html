<!DOCTYPE html>
<html>
<head>
  <title>Azura</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #0a0a0a, #000);
      color: white;
      overflow-x: hidden;
    }

    html { scroll-behavior: smooth; }

    /* NAV */
    .nav {
      position: fixed;
      top: 20px;
      right: 30px;
      z-index: 10;
    }

    .nav a {
      color: #aaa;
      margin-left: 20px;
      text-decoration: none;
      transition: 0.3s;
    }

    .nav a:hover { color: #fff; }

    /* SECTION */
    section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      opacity: 0;
      transform: translateY(40px);
      transition: 0.8s ease;
    }

    section.active {
      opacity: 1;
      transform: translateY(0);
    }

    /* CARD */
    .card {
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 40px rgba(255,255,255,0.08);
    }

    /* NAME GLOW */
    h1 {
      font-size: 34px;
      text-shadow: 0 0 10px #fff, 0 0 25px #fff;
    }

    .tagline { color: #888; font-size: 14px; }
    .desc { margin-top: 15px; color: #bbb; font-size: 14px; }

    /* TYPING */
    #typing {
      margin-top: 10px;
      color: #aaa;
      font-size: 13px;
      height: 18px;
    }

    /* DISCORD CARD */
    .discord-card {
      margin-top: 20px;
      padding: 15px;
      border-radius: 12px;
      background: #2b2d31;
      text-align: left;
    }

    .discord-header {
      display: flex;
      align-items: center;
    }

    .discord-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .status { color: #23a55a; font-size: 12px; }

    .bio {
      margin-top: 10px;
      font-size: 13px;
      color: #ccc;
    }

    /* BUTTONS */
    .btn {
      display: block;
      margin: 12px auto;
      padding: 12px;
      border-radius: 10px;
      text-decoration: none;
      width: 80%;
      color: white;
      position: relative;
      overflow: hidden;
      transition: 0.3s;
    }

    .email {
      background: #111;
      box-shadow: 0 0 10px #fff;
    }

    .discord {
      background: #5865F2;
      box-shadow: 0 0 15px #5865F2;
    }

    .instagram {
      background: linear-gradient(45deg,#ff004c,#ff7a00,#ff00cc);
      box-shadow: 0 0 15px #ff0077;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .email:hover { box-shadow: 0 0 20px #fff; }
    .discord:hover { box-shadow: 0 0 25px #5865F2; }
    .instagram:hover { box-shadow: 0 0 25px #ff0077; }

    /* RIPPLE */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transform: scale(0);
      animation: ripple 0.6s linear;
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    /* PARTICLES */
    canvas {
      position: fixed;
      top:0;
      left:0;
      z-index:-1;
    }

  </style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="nav">
  <a href="#home">Home</a>
  <a href="#about">About</a>
</div>

<section id="home">
  <div class="card">

    <h1>Azura 🚀</h1>
    <div class="tagline">Discord Community Manager</div>

    <div id="typing"></div>

    <div class="desc">
      Helping creators build and manage strong communities.
    </div>

    <div class="discord-card">
      <div class="discord-header">
        <img class="discord-avatar" src="https://cdn.discordapp.com/avatars/1476420907718152204/e8133febacee9df2d85280cd729a4094.webp?size=2048">
        <div>
          <strong>theycallmeazura</strong><br>
          <span class="status">● Online</span>
        </div>
      </div>

      <div class="bio">
        Only mail when required.<br>
        Don't expect DM replies.
      </div>
    </div>

    <a class="btn email" href="mailto:azura7636@gmail.com">Email</a>
    <a class="btn discord">Discord</a>
    <a class="btn instagram" href="https://instagram.com/theycallmeazura" target="_blank">Instagram</a>

  </div>
</section>

<section id="about">
  <div class="card">
    <h1>About Me</h1>
    <div class="desc">
      I manage Discord communities for creators with a focus on growth & moderation.
    </div>
  </div>
</section>

<script>
  // TYPING EFFECT
  const text = "Managing communities. Growing servers. Building brands.";
  let i = 0;
  function type() {
    if (i < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 40);
    }
  }
  type();

  // RIPPLE
  document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("click",function(e){
      const circle=document.createElement("span");
      circle.classList.add("ripple");
      const rect=this.getBoundingClientRect();
      circle.style.left=e.clientX-rect.left+"px";
      circle.style.top=e.clientY-rect.top+"px";
      this.appendChild(circle);
      setTimeout(()=>circle.remove(),600);
    });
  });

  // PARTICLES
  const canvas = document.getElementById("particles");
  const ctx = canvas.getContext("2d");
  canvas.width = innerWidth;
  canvas.height = innerHeight;

  let particles=[];
  for(let i=0;i<70;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*2,
      dx:Math.random()-0.5,
      dy:Math.random()-0.5
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle="white";
      ctx.fill();
      p.x+=p.dx;
      p.y+=p.dy;
    });
    requestAnimationFrame(draw);
  }
  draw();

  // SCROLL
  const sections=document.querySelectorAll("section");
  function show(){
    let y=scrollY;
    sections.forEach(s=>{
      if(y > s.offsetTop - window.innerHeight/1.3){
        s.classList.add("active");
      }
    });
  }
  addEventListener("scroll",show);
  addEventListener("load",show);
</script>

</body>
</html>
